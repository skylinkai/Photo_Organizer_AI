<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Photo Organizer</title>
<style>
  body { font-family: Arial, sans-serif; margin: 2rem; background: #111; color: #eee; }
  h1 { color: #4fc3f7; }
  form { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; }
  input, select { padding: 0.4rem; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; }
  button { padding: 0.5rem 1rem; background: #4fc3f7; color: #111; border: none; border-radius: 4px; cursor: pointer; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { background: #1c1c1c; border-radius: 8px; overflow: hidden; }
  .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
  .meta { padding: 0.5rem; font-size: 0.8rem; color: #aaa; }
  .count { color: #888; margin-bottom: 1rem; }
</style>
</head>
<body>
<h1>Smart Photo Organizer</h1>

<form method="get">
  <div>
    <label>From date</label>
    <input type="date" name="date_from" value="{{ filters.get('date_from', '') }}">
  </div>
  <div>
    <label>To date</label>
    <input type="date" name="date_to" value="{{ filters.get('date_to', '') }}">
  </div>
  <div>
    <label>Person</label>
    <select name="person">
      <option value="">Any</option>
      {% for p in persons %}
      <option value="{{ p }}" {% if filters.get('person') == p %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label>Min years old</label>
    <input type="number" step="0.1" name="min_years" value="{{ filters.get('min_years', '') }}">
  </div>
  <div>
    <label>Max years old</label>
    <input type="number" step="0.1" name="max_years" value="{{ filters.get('max_years', '') }}">
  </div>
  <button type="submit">Filter</button>
</form>

<p class="count">{{ photos|length }} photo(s) found</p>

<div class="grid">
  {% for photo in photos %}
  <div class="card">
    <img src="/photo/{{ photo['id'] }}" alt="photo">
    <div class="meta">
      {{ photo['date_taken'] }}<br>
      {{ photo['filepath'].split('/')[-1] }}
    </div>
  </div>
  {% endfor %}
</div>

</body>
</html>
